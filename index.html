<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strong Volume Trend Dashboard</title>
    <meta name="description" content="" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-inner">
                <div id="strategyTitle" class="strategy-title"></div>
                <div id="strategyDescription" class="strategy-description"></div>
                <nav class="tabs" aria-label="Report Tabs">
                    <button class="tab active" data-tab="overview">
                        <span class="tab-icon icon-overview"></span>
                        <span>Overview</span>
                    </button>
                    <button class="tab" data-tab="equity-curve">
                        <span class="tab-icon icon-equity"></span>
                        <span>Equity Curve</span>
                    </button>
                    <button class="tab" data-tab="metrics-report">
                        <span class="tab-icon icon-metrics"></span>
                        <span>Metrics Report</span>
                    </button>
                    <button class="tab" data-tab="monthly-returns">
                        <span class="tab-icon icon-monthly"></span>
                        <span>Monthly Returns</span>
                    </button>
                    <button class="tab" data-tab="positions">
                        <span class="tab-icon icon-positions"></span>
                        <span>Positions</span>
                    </button>
                </nav>
            </div>
        </header>

        <main class="content">
            <section class="panel active" id="overview">
                <div class="panel-header">
                    <div>
                        <div class="panel-title">Overview</div>
                        <div class="panel-subtitle" id="overviewSubtitle">Lade Strategieübersicht ...</div>
                    </div>
                    <div class="badge" id="lastUpdateBadge">Noch kein Stand geladen</div>
                </div>
                <div class="body-section">
                    <div class="grid-cards" id="overviewCards"></div>

                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>KPI</th>
                                    <th>Wert</th>
                                </tr>
                            </thead>
                            <tbody id="overviewTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section class="panel" id="equity-curve">
                <div class="panel-header">
                    <div>
                        <div class="panel-title">Equity Curve</div>
                    </div>
                </div>
                <div class="chart-wrap">
                    <div class="chart-box">
                        <svg id="equityChart" viewBox="0 0 1000 340" preserveAspectRatio="xMidYMid meet" aria-label="Equity Curve Chart"></svg>
                    </div>
                </div>
            </section>

            <section class="panel" id="metrics-report">
                <div class="panel-header">
                    <div>
                        <div class="panel-title">Metrics Report</div>
                    </div>
                    <div class="metrics-toolbar">
                        <label for="scoreCardSelect">Select ScoreCard:</label>
                        <select id="scoreCardSelect">
                            <option>Summary ScoreCard</option>
                        </select>
                    </div>
                </div>
                <div class="body-section table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>KPI</th>
                                <th>Value</th>
                            </tr>
                        </thead>
                        <tbody id="metricsTableBody"></tbody>
                    </table>
                </div>
            </section>

            <section class="panel" id="monthly-returns">
                <div class="panel-header">
                    <div>
                        <div class="panel-title">Monthly Returns</div>
                    </div>
                </div>
                <div class="body-section">
                    <div class="months-grid" id="monthlyReturnsGrid"></div>
                </div>
            </section>

            <section class="panel" id="positions">
                <div class="panel-header">
                    <div>
                        <div class="panel-title">Positions</div>
                    </div>
                </div>
                <div class="body-section table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-symbol">Symbol</th>
                                <th class="sortable" data-sort="entryDate">Entry Date <span class="sort-icon"></span></th>
                                <th class="sortable" data-sort="exitDate">Exit Date <span class="sort-icon"></span></th>
                                <th>Entry Price</th>
                                <th>Exit Price</th>
                                <th>Qty</th>
                                <th>P/L</th>
                                <th class="sortable" data-sort="plPercent">P/L % <span class="sort-icon"></span></th>
                            </tr>
                        </thead>
                        <tbody id="positionsTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="cardTooltip" class="card-tooltip" role="tooltip"></div>
    <script src="js/monthly-returns.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
